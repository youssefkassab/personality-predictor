<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/stayel.css">

    <title>Document</title>
</head>
<body>
    <div class="modern-form-container">
        <form class="modern-form">
            <h2>Personal Social Habits</h2>
            <div class="form-group">
                <label for="timeSpentAlone">Time Spent Alone (hours/day)</label>
                <input type="number" id="timeSpentAlone" name="Time_spent_Alone" min="0" max="24" step="0.1" placeholder="e.g., 2.5" required>
            </div>
            <div class="form-group">
                <label for="socialEventAttendance">Social Event Attendance (per month)</label>
                <input type="number" id="socialEventAttendance" name="Social_event_attendance" min="0" placeholder="e.g., 3" required>
            </div>
            <div class="form-group">
                <label for="goingOutside">Going Outside (days/week)</label>
                <input type="number" id="goingOutside" name="Going_outside" min="0" max="7" placeholder="e.g., 5" required>
            </div>
            <div class="form-group">
                <label for="postFrequency">Post Frequency (posts/week)</label>
                <input type="number" id="postFrequency" name="Post_frequency" min="0" placeholder="e.g., 4" required>
            </div>
            <button type="submit" class="modern-btn">Submit</button>
        </form>
    </div>
    <script src="assets/JS/main.js"></script>
</body>
</html>
